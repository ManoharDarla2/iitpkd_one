name: innovationlab-api
region: blr

services:
  - name: api
    image:
      registry_type: DOCR
      registry: innovationlab-registry
      repository: innovationlab-api
      tag: latest
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
